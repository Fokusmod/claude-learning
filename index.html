<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 заключённых — 8-bit симуляция</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <header class="header">
            <h1 class="title">100 ЗАКЛЮЧЁННЫХ</h1>
            <h2 class="subtitle">и 100 ящиков</h2>
        </header>

        <!-- Арены -->
        <div class="arenas">
            <div class="arena">
                <canvas id="canvas-cycle"></canvas>
            </div>
            <div class="arena">
                <canvas id="canvas-random"></canvas>
            </div>
        </div>

        <!-- Панель управления -->
        <div class="controls">
            <div class="controls-row">
                <button id="btn-play" class="btn btn-primary" title="Воспроизвести / Пауза">▶</button>
                <button id="btn-step" class="btn" title="Шаг (один заключённый)">⏭</button>
                <button id="btn-reset" class="btn" title="Сбросить">↺</button>
            </div>

            <div class="controls-row speed-controls">
                <span class="control-label">Скорость:</span>
                <button class="speed-btn" data-speed="1">1×</button>
                <button class="speed-btn active" data-speed="2">2×</button>
                <button class="speed-btn" data-speed="3">5×</button>
                <button class="speed-btn" data-speed="4">20×</button>
                <button class="speed-btn" data-speed="5">50×</button>
            </div>

            <div class="controls-row batch-controls">
                <span class="control-label">Заходов:</span>
                <input id="batch-input" type="number" value="10" min="1" max="1000" class="batch-input">
                <button id="btn-batch" class="btn" title="Запустить N заходов подряд">▶ N</button>
            </div>
        </div>

        <!-- Статистика -->
        <div id="stats" class="stats-panel">
            <div class="stat-row">
                <span class="stat-label">Заходов:</span>
                <span class="stat-value">0</span>
            </div>
            <div class="stat-group">
                <div class="stat-item cycle">
                    <span class="stat-label">Циклы:</span>
                    <span class="stat-value">0/0 (0%)</span>
                    <span class="stat-detail">нашли 0%</span>
                </div>
                <div class="stat-item random">
                    <span class="stat-label">Случайная:</span>
                    <span class="stat-value">0/0 (0%)</span>
                    <span class="stat-detail">нашли 0%</span>
                </div>
            </div>
        </div>

        <!-- Лог -->
        <div class="log-section">
            <h3 class="log-title">📋 ЛОГ</h3>
            <div id="log" class="log-container"></div>
        </div>

        <!-- Легенда -->
        <div class="legend">
            <span class="legend-item">
                <span class="legend-color" style="background:#4ecca3;"></span>
                Стратегия циклов (~31% успеха)
            </span>
            <span class="legend-item">
                <span class="legend-color" style="background:#ffd369;"></span>
                Случайная стратегия (~0%)
            </span>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/strategy.js"></script>
    <script src="js/game.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
